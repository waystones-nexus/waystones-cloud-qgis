name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: pip install --break-system-packages -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen
